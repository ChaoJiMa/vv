name = "neighbor-help-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "neighbor-help-db"
database_id = "65295c63-27af-4806-bbf9-5aebb63386fa"
migrations_dir = "migrations"

# 图片对象存储:发帖图片存这里,通过 GET /api/img/:key 公开代理读取
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "neighbor-help-images"

# 定时任务:每天凌晨 4:17(UTC)对账一次 R2 图片孤儿,清理无帖子引用且超过宽限期的对象。
# 见 src/reconcile.js 与 src/index.js 的 scheduled 导出。
[triggers]
crons = ["17 4 * * *"]

